services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8080
    depends_on:
      - backend
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules

  test-backend:
    image: rust:1.88-bookworm
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
    command: cargo test

  test-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
    command: npm run test:coverage

  lint-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
    command: sh -c "npm run lint && npm run format && npm run check"

volumes:
  frontend_node_modules:
