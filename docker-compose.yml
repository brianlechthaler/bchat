services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      OLLAMA_URL: http://ollama:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8080
    depends_on:
      - backend
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules

  test-backend:
    image: rust:1.88-bookworm
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
    command: cargo test

  test-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
    command: npm run test:coverage

  lint-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
    command: sh -c "npm install && npm run lint && npm run format && npx svelte-kit sync && npm run check"

volumes:
  frontend_node_modules:
  ollama_data:
